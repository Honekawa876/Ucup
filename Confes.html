<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
}

.container{
    text-align:center;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
    max-width:500px;
    animation:fadeIn 1.5s;
}

h1{
    color:#ff4d6d;
    margin-bottom:20px;
}

p{
    font-size:18px;
    color:#555;
    margin-bottom:30px;
    line-height:1.6;
}

button{
    padding:12px 30px;
    font-size:18px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    background:#ff4d6d;
    color:white;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    background:#ff1e4d;
}

#surprise{
    margin-top:25px;
    font-size:24px;
    color:#ff1744;
    display:none;
    animation:pop .8s;
}

.heart{
    position:absolute;
    color:red;
    animation:float 5s linear infinite;
    opacity:.7;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(.5);
    }
    to{
        transform:translateY(-120px) scale(1.5);
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes pop{
    0%{
        transform:scale(0);
    }
    100%{
        transform:scale(1);
    }
}
</style>

</head>
<body>

<div class="container">
    <h1>❤️ Hai Kamu ❤️</h1>

    <p>
        Sejak mengenalmu, hariku terasa lebih berwarna.
        Senyummu selalu berhasil membuatku bahagia.
        Mungkin ini waktu yang tepat untuk mengatakan sesuatu...
    </p>

    <button onclick="showLove()">
        Klik di sini 💖
    </button>

    <div id="surprise">
        ❤️ Maukah Kamu Menjadi Pacarku? ❤️
    </div>
</div>

<script>

function showLove(){
    document.getElementById("surprise").style.display="block";

    for(let i=0;i<40;i++){
        createHeart();
    }
}

function createHeart(){
    const heart=document.createElement("div");

    heart.className="heart";
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(20+Math.random()*30)+"px";
    heart.style.animationDuration=(3+Math.random()*4)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },7000);
}

setInterval(createHeart,500);

</script>

</body>
</html>
